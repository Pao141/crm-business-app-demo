<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Simple · Natalia Veliez</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pk:#D4537E;--pk-d:#993556;--pk-dd:#72243E;--pk-l:#F4C0D1;--pk-ll:#FBEAF0;--bg:#f9f4f6;--white:#fff;--text:#1a1a1a;--muted:#6b7280;--border:#eedde5;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.app{display:flex;height:100vh}
.sidebar{width:220px;background:var(--pk-dd);display:flex;flex-direction:column;flex-shrink:0}
.logo-area{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.logo{font-size:16px;font-weight:700;color:#fff}.logo-sub{font-size:10px;color:var(--pk-l);margin-top:2px}
.nav{padding:10px 0;flex:1;overflow-y:auto;min-height:0}
.nav-lbl{font-size:9px;font-weight:600;color:var(--pk-l);letter-spacing:0.1em;padding:12px 18px 6px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;color:rgba(255,255,255,0.65);font-size:13px;border-left:3px solid transparent;transition:all 0.15s}
.ni:hover{background:rgba(255,255,255,0.08);color:#fff}
.ni.active{background:rgba(255,255,255,0.13);color:#fff;border-left-color:var(--pk-l);font-weight:500}
.ni svg{width:17px;height:17px;flex-shrink:0}
.user-area{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:10px}
.uav{width:34px;height:34px;border-radius:50%;background:var(--pk);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.uname{font-size:12px;font-weight:500;color:#fff}.urole{font-size:10px;color:var(--pk-l)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all 0.15s}
.btn-pk{background:var(--pk);color:#fff}.btn-pk:hover{background:var(--pk-d)}
.btn-ol{background:var(--white);color:var(--pk-d);border:1px solid var(--pk-l)}.btn-ol:hover{background:var(--pk-ll)}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.stat-lbl{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:6px}
.stat-val{font-size:26px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;margin-top:5px;color:var(--green)}
.stat-bar{height:3px;background:var(--pk-ll);border-radius:2px;margin-top:10px}
.stat-bar-f{height:100%;background:var(--pk);border-radius:2px}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sh-title{font-size:14px;font-weight:600}
.tw{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:22px}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;background:var(--pk-ll);border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid #faf0f4;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fdf7fa;cursor:pointer}
.ci{display:flex;align-items:center;gap:10px}
.cav{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.cn{font-weight:500;font-size:13px}.cc{font-size:11px;color:var(--muted)}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:#dcfce7;color:#166534}.ba{background:#fef3c7;color:#92400e}.bb{background:#dbeafe;color:#1e40af}.bp{background:var(--pk-ll);color:var(--pk-dd)}.bgr{background:#f1f5f9;color:#475569}
.pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
.stage{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;min-height:200px}
.stage-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.stage-n{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
.stage-c{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.dc{background:var(--pk-ll);border:1px solid var(--pk-l);border-radius:9px;padding:10px;margin-bottom:8px;cursor:default;transition:all 0.15s}
.dc-acts{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--pk-l)}
.dc-acts .iconbtn{background:var(--white)}
.dc:hover{border-color:var(--pk);background:#fce8f0}
.dn{font-size:12px;font-weight:600;color:var(--pk-dd);margin-bottom:3px}
.dco{font-size:11px;color:var(--muted);margin-bottom:5px}
.dv{font-size:13px;font-weight:700;color:var(--pk-d)}
.dp2{font-size:10px;color:var(--muted);margin-top:3px}
.detail-panel{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px;display:none}
.detail-panel.open{display:block}
.dp-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.dp-name{font-size:18px;font-weight:700}.dp-company{font-size:13px;color:var(--muted);margin-top:3px}
.dp-close{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.dp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.dp-field{background:var(--pk-ll);border-radius:9px;padding:10px 14px}
.dp-fl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px}
.dp-fv{font-size:13px;font-weight:500}
.tl{border-top:1px solid var(--border);padding-top:14px}
.tl-t{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px}
.tl-i{display:flex;gap:10px;margin-bottom:10px}
.tl-d{width:8px;height:8px;border-radius:50%;background:var(--pk);margin-top:5px;flex-shrink:0}
.tl-txt{font-size:13px}.tl-dt{font-size:11px;color:var(--muted)}
.tabs{display:flex;gap:2px;background:var(--border);border-radius:9px;padding:3px;width:fit-content;margin-bottom:16px}
.tab{padding:7px 16px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:all 0.15s}
.tab.active{background:var(--white);color:var(--pk-d);box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:16px;padding:26px;width:460px;max-width:92vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
input,select{padding:9px 13px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);outline:none}
input:focus,select:focus{border-color:var(--pk)}
.modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--pk-dd);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:200;opacity:0;transform:translateY(8px);transition:all 0.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.acts-col{display:flex;gap:6px}
.iconbtn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.iconbtn:hover{background:var(--pk-ll);border-color:var(--pk-l)}
.iconbtn.del:hover{background:#fee2e2;border-color:#fca5a5}
.modal.confirm{width:380px}
.confirm-msg{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:4px}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#dc2626}
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
.report-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px}
.report-card-title{font-size:13px;font-weight:600;margin-bottom:14px}
.rbar-row{margin-bottom:12px}
.rbar-row:last-child{margin-bottom:0}
.rbar-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.rbar-lbl{color:var(--text)}
.rbar-val{font-weight:600;color:var(--pk-d)}
.rbar-track{height:8px;background:var(--pk-ll);border-radius:4px;overflow:hidden}
.rbar-fill{height:100%;background:var(--pk);border-radius:4px;transition:width 0.4s}
.report-empty{font-size:12px;color:var(--muted);text-align:center;padding:10px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo-area"><div class="logo">NPV · CRM</div><div class="logo-sub">Power Platform Demo</div><div style="font-size:9px;color:#ffffff80;margin-top:4px;font-weight:600">BUILD: Oportunidades v3</div></div>
    <div class="nav">
      <div class="nav-lbl">Principal</div>
      <div class="ni active" onclick="go('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard
      </div>
      <div class="ni" onclick="go('clientes')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Clientes
      </div>
      <div class="ni" onclick="go('pipeline')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="4" height="18"/><rect x="10" y="8" width="4" height="13"/><rect x="17" y="5" width="4" height="16"/></svg>Pipeline
      </div>
      <div class="nav-lbl">Gestión</div>
      <div class="ni" onclick="go('oportunidades')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Oportunidades
      </div>
      <div class="ni" onclick="go('actividades')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Actividades
      </div>
      <div class="ni" onclick="go('reportes')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Reportes
      </div>
    </div>
    <div class="user-area">
      <div class="uav">NV</div>
      <div><div class="uname">Natalia Veliez</div><div class="urole">CRM Specialist</div></div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div style="display:flex;gap:10px;align-items:center">
        <input type="text" id="srch" placeholder="🔍  Buscar cliente..." style="padding:8px 14px;border:1px solid var(--border);border-radius:9px;font-size:13px;font-family:Inter,sans-serif;outline:none;width:220px" oninput="filterC()">
        <button class="btn btn-pk" id="addBtn" onclick="openModal()">+ Nuevo cliente</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Nuevo cliente</div>
    <div class="frow">
      <div class="fg"><label>Nombre</label><input id="fn" placeholder="Sofía"></div>

  </div>
</div>

<div class="modal-bg" id="amodal">
  <div class="modal">
    <div class="modal-title" id="amodalTitle">Nueva actividad</div>
    <div class="frow">
      <div class="fg"><label>Tipo</label><select id="atp"><option>Llamada</option><option>Reunión</option><option>Email</option></select></div>
      <div class="fg"><label>Estado</label><select id="ast"><option>Pendiente</option><option>Confirmada</option><option>Borrador</option></select></div>
    </div>
    <div class="fg"><label>Descripción</label><input id="ads" placeholder="Seguimiento propuesta..."></div>
    <div class="frow">
      <div class="fg"><label>Cliente</label><select id="acl"></select></div>
      <div class="fg"><label>Fecha y hora</label><input id="afh" placeholder="Hoy 10:00"></div>
    </div>
    <div class="modal-acts">
      <button class="btn btn-ol" onclick="closeAModal()">Cancelar</button>
      <button class="btn btn-pk" id="saveActBtn" onclick="saveActivity()">✓ Guardar</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="omodal">
  <div class="modal">
    <div class="modal-title" id="omodalTitle">Nueva oportunidad</div>
    <div class="fg"><label>Nombre de la oportunidad</label><input id="onm" placeholder="Implementación CRM"></div>
    <div class="frow">
      <div class="fg"><label>Cliente</label><select id="ocl"></select></div>
      <div class="fg"><label>Etapa</label><select id="oet"><option>Lead</option><option>Contactado</option><option>Propuesta</option><option>Negociación</option><option>Ganado</option><option>Perdida</option></select></div>
    </div>
    <div class="frow">

      <div class="fg"><label>Probabilidad</label><input id="opr" placeholder="60%"></div>
    </div>
    <div class="modal-acts">
      <button class="btn btn-ol" onclick="closeOModal()">Cancelar</button>
      <button class="btn btn-pk" id="saveOppBtn" onclick="saveOpportunity()">✓ Guardar</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="cmodal">
  <div class="modal confirm">
    <div class="modal-title" id="cmodalTitle">¿Eliminar registro?</div>

    <div class="modal-acts">
      <button class="btn btn-ol" onclick="closeCModal()">Cancelar</button>
      <button class="btn btn-danger" onclick="doConfirm()">🗑 Eliminar</button>
    </div>
  </div>
</div>
<div class="toast" id="toastEl"></div>

<script>
const AVCOL=['#D4537E','#993556','#72243E','#3b82f6','#22c55e','#f59e0b','#8b5cf6'];
const stages=['Lead','Contactado','Propuesta','Negociación','Ganado','Perdida'];
const sc={'Lead':'#93c5fd','Contactado':'#6ee7b7','Propuesta':'#fbbf24','Negociación':'#f97316','Ganado':'#22c55e','Perdida':'#ef4444'};
let clients=[

  {id:6,n:'Diego',a:'Peralta',e:'Consultora DGP',em:'diego@dgp.com',t:'+54 9 11 7789-0123',st:'Prospecto',in:'Servicios',v:'$7,400',f:'20 feb 2025',or:'Web'},

  {id:3,tp:'Email',ds:'Enviar cotización integración',cl:'Andrés Silva',fh:'Mañana 09:00',st:'Pendiente'},

let view='dashboard',sf='todos',sfo='todas';
let editClientId=null, editActId=null, editOppId=null, nextClientId=9, nextActId=7, nextOppId=8;
let pendingConfirm=null;
function renderPipelineBoard(actions){
  return stages.map(s=>{
    const items=opps.filter(o=>o.et===s);
    return `<div class="stage"><div class="stage-h"><div class="stage-n">${s}</div><div class="stage-c" style="background:${sc[s]}30;color:${sc[s]}">${items.length}</div></div>${items.map(o=>`<div class="dc"><div class="dn">${o.nm}</div><div class="dco">${o.cl}</div><div class="dv">${o.v}</div><div class="dp2">Prob: ${o.pr}</div>${actions?`<div class="dc-acts"><button class="iconbtn" title="Editar" onclick="openOModal(${o.id})">✏️</button><button class="iconbtn del" title="Eliminar" onclick="confirmDelete('opp',${o.id},'${o.nm.replace(/'/g,"\\'")}')">🗑️</button></div>`:''}</div>`).join('')||`<div style="text-align:center;padding:14px;color:var(--muted);font-size:11px">${actions?'Sin oportunidades':'—'}</div>`}</div>`;
  }).join('');
}
function ini(n,a){return(n[0]+(a?a[0]:'')).toUpperCase()}
function avc(id){return AVCOL[id%AVCOL.length]}
function bet(et){return `<span class="badge" style="background:${sc[et]}30;color:${sc[et]}">${et}</span>`}
function estadoOpp(et){return et==='Ganado'?'Ganada':et==='Perdida'?'Perdida':'Abierta'}
function bestado(et){
  const est=estadoOpp(et);
  const cols={Abierta:'#3b82f6',Ganada:'#22c55e',Perdida:'#ef4444'};
  return `<span class="badge" style="background:${cols[est]}22;color:${cols[est]}">${est==='Abierta'?'🔵':est==='Ganada'?'🟢':'🔴'} ${est}</span>`;
}
function renderOppTable(data){
  if(!data.length)return`<div style="padding:32px;text-align:center;color:var(--muted)">No hay oportunidades cargadas.</div>`;
  return `<div class="tw"><table><thead><tr><th>Oportunidad</th><th>Cliente</th><th>Etapa</th><th>Estado</th><th>Valor</th><th>Probabilidad</th><th>Acciones</th></tr></thead><tbody>${data.map(o=>`
  <tr>
    <td style="font-weight:500">${o.nm}</td>
    <td style="color:var(--muted)">${o.cl}</td>
    <td>${bet(o.et)}</td>
    <td>${bestado(o.et)}</td>
    <td style="font-weight:600;color:var(--pk-d)">${o.v}</td>
    <td style="color:var(--muted)">${o.pr}</td>
    <td><div class="acts-col"><button class="iconbtn" title="Editar" onclick="openOModal(${o.id})">✏️</button><button class="iconbtn del" title="Eliminar" onclick="confirmDelete('opp',${o.id},'${o.nm.replace(/'/g,"\\'")}')">🗑️</button></div></td>
  </tr>`).join('')}</tbody></table></div>`;
}
function groupCount(arr,key){
  const m={};
  arr.forEach(x=>{m[x[key]]=(m[x[key]]||0)+1});
  return Object.entries(m).map(([label,count])=>({label,count})).sort((a,b)=>b.count-a.count);
}
function parseVal(v){return parseInt(String(v).replace(/[^0-9]/g,''))||0}
function reportBars(items,isMoney){
  if(!items.length)return`<div class="report-empty">Sin datos</div>`;
  const max=Math.max(...items.map(i=>i.count),1);
  return items.map(i=>`<div class="rbar-row"><div class="rbar-top"><span class="rbar-lbl">${i.label}</span><span class="rbar-val">${isMoney?'$'+i.count.toLocaleString('es-AR'):i.count}</span></div><div class="rbar-track"><div class="rbar-fill" style="width:${(i.count/max*100)}%"></div></div></div>`).join('');
}
function bst(s){const m={Activo:'bg','En negociación':'ba',Prospecto:'bb',Inactivo:'bgr'};return`<span class="badge ${m[s]||'bgr'}">${s}</span>`}
function btp(s){const m={Llamada:'bb',Reunión:'bp',Email:'ba'};return`<span class="badge ${m[s]||'bgr'}">${s}</span>`}
function bact(s){const m={Pendiente:'ba',Confirmada:'bg',Borrador:'bgr'};return`<span class="badge ${m[s]||'bgr'}">${s}</span>`}

function renderTable(data){
  if(!data.length)return`<div style="padding:32px;text-align:center;color:var(--muted)">No hay clientes que coincidan.</div>`;
  return`<table><thead><tr><th>Cliente</th><th>Email</th><th>Industria</th><th>Estado</th><th>Valor est.</th><th>Desde</th><th>Acciones</th></tr></thead><tbody>${data.map(c=>`
  <tr onclick="showDetail(${c.id})">
    <td><div class="ci"><div class="cav" style="background:${avc(c.id)}">${ini(c.n,c.a)}</div><div><div class="cn">${c.n} ${c.a}</div><div class="cc">${c.e}</div></div></div></td>
    <td style="color:var(--muted)">${c.em}</td>
    <td><span class="badge bp">${c.in}</span></td>
    <td>${bst(c.st)}</td>
    <td style="font-weight:600;color:var(--pk-d)">${c.v}</td>
    <td style="color:var(--muted)">${c.f}</td>
    <td><div class="acts-col" onclick="event.stopPropagation()">
      <button class="iconbtn" title="Editar" onclick="openModal(${c.id})">✏️</button>
      <button class="iconbtn del" title="Eliminar" onclick="confirmDelete('client',${c.id},'${(c.n+' '+c.a).replace(/'/g,"\\'")}')">🗑️</button>
    </div></td>
  </tr>`).join('')}</tbody></table>`;
}

function showDetail(id){
  const c=clients.find(x=>x.id===id);if(!c)return;
  const panel=document.getElementById('dpanel');if(!panel)return;
  const tl=[
    {t:`Incorporado vía ${c.or}`,d:c.f},
    {t:'Primer contacto realizado',d:'2 días después'},
    {t:'Propuesta enviada por email',d:'1 semana después'},
    {t:'Reunión de seguimiento programada',d:'Próximamente'},
  ];
  panel.innerHTML=`
  <div class="dp-head">
    <div><div class="dp-name">${c.n} ${c.a}</div><div class="dp-company">${c.e} · ${c.in}</div></div>
    <div style="display:flex;gap:8px;align-items:center">${bst(c.st)}<button class="iconbtn" title="Editar" onclick="openModal(${c.id})">✏️</button><button class="iconbtn del" title="Eliminar" onclick="confirmDelete('client',${c.id},'${(c.n+' '+c.a).replace(/'/g,"\\'")}')">🗑️</button><button class="dp-close" onclick="document.getElementById('dpanel').classList.remove('open')">✕</button></div>
  </div>
  <div class="dp-grid">
    <div class="dp-field"><div class="dp-fl">Email</div><div class="dp-fv">${c.em}</div></div>
    <div class="dp-field"><div class="dp-fl">Teléfono</div><div class="dp-fv">${c.t}</div></div>
    <div class="dp-field"><div class="dp-fl">Valor estimado</div><div class="dp-fv" style="color:var(--pk-d);font-weight:700">${c.v}</div></div>
    <div class="dp-field"><div class="dp-fl">Origen</div><div class="dp-fv">${c.or}</div></div>
    <div class="dp-field"><div class="dp-fl">Incorporado</div><div class="dp-fv">${c.f}</div></div>
    <div class="dp-field"><div class="dp-fl">Industria</div><div class="dp-fv">${c.in}</div></div>
  </div>
  <div class="tl"><div class="tl-t">Historial</div>${tl.map(i=>`<div class="tl-i"><div class="tl-d"></div><div><div class="tl-txt">${i.t}</div><div class="tl-dt">${i.d}</div></div></div>`).join('')}</div>`;
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function filterC(){
  const q=document.getElementById('srch').value.toLowerCase();
  if(view==='clientes'){
    const fd=clients.filter(c=>(c.n+' '+c.a+' '+c.e).toLowerCase().includes(q));
    document.getElementById('ctable').innerHTML=renderTable(fd);
  }
}

function go(v){
  view=v;
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('active'));
  const idx={dashboard:0,clientes:1,pipeline:2,oportunidades:3,actividades:4,reportes:5};
  document.querySelectorAll('.ni')[idx[v]]?.classList.add('active');
  document.getElementById('page-title').textContent={dashboard:'Dashboard',clientes:'Clientes',pipeline:'Pipeline de ventas',oportunidades:'Oportunidades',actividades:'Actividades',reportes:'Reportes'}[v];
  updateAddBtn();
  renderView();
}

function updateAddBtn(){
  const b=document.getElementById('addBtn');
  const srch=document.getElementById('srch');
  if(view==='reportes'){
    b.style.display='none';
    srch.style.display='none';
  } else if(view==='actividades'){
    b.style.display='inline-flex';srch.style.display='none';
    b.textContent='+ Nueva actividad';b.onclick=()=>openAModal();
  } else if(view==='oportunidades'){
    b.style.display='inline-flex';srch.style.display='none';
    b.textContent='+ Nueva oportunidad';b.onclick=()=>openOModal();
  } else if(view==='pipeline'){
    b.style.display='none';srch.style.display='none';
  } else {
    b.style.display='inline-flex';srch.style.display=view==='clientes'?'inline-block':'none';
    b.textContent='+ Nuevo cliente';b.onclick=()=>openModal();
  }
}

function renderView(){
  const el=document.getElementById('content');
  const activos=clients.filter(c=>c.st==='Activo').length;
  const statsHtml=`<div class="stats">
    <div class="stat"><div class="stat-lbl">Clientes activos</div><div class="stat-val">${activos}</div><div class="stat-sub">↑ +2 este mes</div><div class="stat-bar"><div class="stat-bar-f" style="width:72%"></div></div></div>
    <div class="stat"><div class="stat-lbl">Oportunidades</div><div class="stat-val">${opps.filter(o=>estadoOpp(o.et)==='Abierta').length}</div><div class="stat-sub">↑ +1 esta semana</div><div class="stat-bar"><div class="stat-bar-f" style="width:55%"></div></div></div>
    <div class="stat"><div class="stat-lbl">Pipeline total</div><div class="stat-val">$87K</div><div class="stat-sub">↑ +12% vs mes ant.</div><div class="stat-bar"><div class="stat-bar-f" style="width:68%"></div></div></div>
    <div class="stat"><div class="stat-lbl">Tasa de cierre</div><div class="stat-val">34%</div><div class="stat-sub">↑ +5% vs Q1</div><div class="stat-bar"><div class="stat-bar-f" style="width:34%"></div></div></div>
  </div>`;

  if(view==='dashboard'){
    el.innerHTML=statsHtml+
    `<div class="sh"><div class="sh-title">Clientes recientes</div><button class="btn btn-ol" onclick="go('clientes')">Ver todos →</button></div>
    <div class="tw">${renderTable(clients.slice(0,4))}</div>
    <div class="sh"><div class="sh-title">Pipeline de ventas</div><button class="btn btn-ol" onclick="go('pipeline')">Ver completo →</button></div>
    <div class="pipeline">${renderPipelineBoard(false)}</div>`;
  } else if(view==='clientes'){
    const fd=sf==='todos'?clients:clients.filter(c=>c.st===sf);
    el.innerHTML=`<div id="dpanel" class="detail-panel"></div>
    <div class="sh"><div class="tabs">
      <div class="tab ${sf==='todos'?'active':''}" onclick="setFilter('todos',this)">Todos (${clients.length})</div>
      <div class="tab ${sf==='Activo'?'active':''}" onclick="setFilter('Activo',this)">Activos</div>
      <div class="tab ${sf==='Prospecto'?'active':''}" onclick="setFilter('Prospecto',this)">Prospectos</div>
      <div class="tab ${sf==='En negociación'?'active':''}" onclick="setFilter('En negociación',this)">En negociación</div>
    </div></div>
    <div class="tw" id="ctable">${renderTable(fd)}</div>`;
  } else if(view==='pipeline'){
    el.innerHTML=statsHtml+`<div class="sh"><div class="sh-title">Pipeline de ventas</div><button class="btn btn-pk" onclick="openOModal()">+ Nueva oportunidad</button></div><div class="pipeline">${renderPipelineBoard(true)}</div>`;
  } else if(view==='oportunidades'){
    const fo=sfo==='todas'?opps:opps.filter(o=>estadoOpp(o.et)===sfo);
    el.innerHTML=statsHtml+`<div class="sh"><div class="tabs">
      <div class="tab ${sfo==='todas'?'active':''}" onclick="setFilterOpp('todas',this)">Todas (${opps.length})</div>
      <div class="tab ${sfo==='Abierta'?'active':''}" onclick="setFilterOpp('Abierta',this)">🔵 Abiertas (${opps.filter(o=>estadoOpp(o.et)==='Abierta').length})</div>
      <div class="tab ${sfo==='Ganada'?'active':''}" onclick="setFilterOpp('Ganada',this)">🟢 Ganadas (${opps.filter(o=>estadoOpp(o.et)==='Ganada').length})</div>
      <div class="tab ${sfo==='Perdida'?'active':''}" onclick="setFilterOpp('Perdida',this)">🔴 Perdidas (${opps.filter(o=>estadoOpp(o.et)==='Perdida').length})</div>
    </div></div>
    <div id="otable">${renderOppTable(fo)}</div>`;
  } else if(view==='reportes'){
    const byStatus=groupCount(clients,'st');
    const byIndustry=groupCount(clients,'in');
    const byOrigin=groupCount(clients,'or');
    const pipelineByStage=stages.map(s=>({label:s,count:opps.filter(o=>o.et===s).reduce((sum,o)=>sum+parseVal(o.v),0)}));
    const actsByType=groupCount(acts,'tp');
    const actsByStatus=groupCount(acts,'st');
    el.innerHTML=statsHtml+`<div class="report-grid">
      <div class="report-card"><div class="report-card-title">Clientes por estado</div>${reportBars(byStatus)}</div>
      <div class="report-card"><div class="report-card-title">Clientes por industria</div>${reportBars(byIndustry)}</div>
      <div class="report-card"><div class="report-card-title">Pipeline por etapa</div>${reportBars(pipelineByStage,true)}</div>
      <div class="report-card"><div class="report-card-title">Origen de clientes</div>${reportBars(byOrigin)}</div>
      <div class="report-card"><div class="report-card-title">Actividades por tipo</div>${reportBars(actsByType)}</div>
      <div class="report-card"><div class="report-card-title">Actividades por estado</div>${reportBars(actsByStatus)}</div>
    </div>`;
  } else {
    el.innerHTML=`<div class="tw"><table><thead><tr><th>Tipo</th><th>Actividad</th><th>Cliente</th><th>Fecha y hora</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>${acts.map(a=>`<tr><td>${btp(a.tp)}</td><td style="font-weight:500">${a.ds}</td><td style="color:var(--muted)">${a.cl}</td><td style="color:var(--muted)">${a.fh}</td><td>${bact(a.st)}</td><td><div class="acts-col"><button class="iconbtn" title="Editar" onclick="openAModal(${a.id})">✏️</button><button class="iconbtn del" title="Eliminar" onclick="confirmDelete('act',${a.id},'${a.ds.replace(/'/g,"\\'")}')">🗑️</button></div></td></tr>`).join('')}</tbody></table></div>`;
  }
}

function setFilter(f,el){
  sf=f;document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  const fd=f==='todos'?clients:clients.filter(c=>c.st===f);
  document.getElementById('ctable').innerHTML=renderTable(fd);
}
function setFilterOpp(f,el){
  sfo=f;el.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  const fo=f==='todas'?opps:opps.filter(o=>estadoOpp(o.et)===f);
  document.getElementById('otable').innerHTML=renderOppTable(fo);
}
function openModal(id){
  editClientId=id||null;
  const c=id?clients.find(x=>x.id===id):null;
  document.getElementById('modalTitle').textContent=c?'Editar cliente':'Nuevo cliente';
  document.getElementById('saveClientBtn').textContent=c?'✓ Guardar cambios':'✓ Guardar';
  document.getElementById('fn').value=c?c.n:'';
  document.getElementById('fa').value=c?c.a:'';
  document.getElementById('fe').value=c&&c.e!=='—'?c.e:'';
  document.getElementById('fem').value=c&&c.em!=='—'?c.em:'';
  document.getElementById('ft').value=c&&c.t!=='—'?c.t:'';
  document.getElementById('fst').value=c?c.st:'Prospecto';
  document.getElementById('fi').value=c?c.in:'Tecnología';
  document.getElementById('fv').value=c?c.v:'';
  document.getElementById('for').value=c?c.or:'LinkedIn';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');editClientId=null}
function saveClient(){
  const n=document.getElementById('fn').value.trim();
  if(!n){toast('Ingresá al menos el nombre');return}
  const data={n,a:document.getElementById('fa').value||'',e:document.getElementById('fe').value||'—',em:document.getElementById('fem').value||'—',t:document.getElementById('ft').value||'—',st:document.getElementById('fst').value,in:document.getElementById('fi').value,v:document.getElementById('fv').value||'$0',or:document.getElementById('for').value};
  if(editClientId){
    const c=clients.find(x=>x.id===editClientId);
    Object.assign(c,data);
    toast('✓ Cliente actualizado');
  } else {
    clients.unshift({id:nextClientId++,...data,f:'Hoy'});
    toast('✓ Cliente guardado');
  }
  closeModal();
  renderView();
}
function deleteClient(id){
  clients=clients.filter(c=>c.id!==id);
  const dp=document.getElementById('dpanel');
  if(dp)dp.classList.remove('open');
  toast('🗑 Cliente eliminado');
  renderView();
}

function populateClientSelect(sel){
  sel.innerHTML=clients.map(c=>`<option value="${c.n} ${c.a}">${c.n} ${c.a}</option>`).join('');
}
function openAModal(id){
  editActId=id||null;
  const a=id?acts.find(x=>x.id===id):null;
  document.getElementById('amodalTitle').textContent=a?'Editar actividad':'Nueva actividad';
  document.getElementById('saveActBtn').textContent=a?'✓ Guardar cambios':'✓ Guardar';
  populateClientSelect(document.getElementById('acl'));
  document.getElementById('atp').value=a?a.tp:'Llamada';
  document.getElementById('ast').value=a?a.st:'Pendiente';
  document.getElementById('ads').value=a?a.ds:'';
  document.getElementById('acl').value=a?a.cl:(clients[0]?clients[0].n+' '+clients[0].a:'');
  document.getElementById('afh').value=a?a.fh:'';
  document.getElementById('amodal').classList.add('open');
}
function closeAModal(){document.getElementById('amodal').classList.remove('open');editActId=null}
function saveActivity(){
  const ds=document.getElementById('ads').value.trim();
  if(!ds){toast('Ingresá una descripción');return}
  const data={tp:document.getElementById('atp').value,ds,cl:document.getElementById('acl').value,fh:document.getElementById('afh').value||'Sin definir',st:document.getElementById('ast').value};
  if(editActId){
    const a=acts.find(x=>x.id===editActId);
    Object.assign(a,data);
    toast('✓ Actividad actualizada');
  } else {
    acts.unshift({id:nextActId++,...data});
    toast('✓ Actividad guardada');
  }
  closeAModal();
  renderView();
}
function deleteActivity(id){
  acts=acts.filter(a=>a.id!==id);
  toast('🗑 Actividad eliminada');
  renderView();
}

function openOModal(id){
  editOppId=id||null;
  const o=id?opps.find(x=>x.id===id):null;
  document.getElementById('omodalTitle').textContent=o?'Editar oportunidad':'Nueva oportunidad';
  document.getElementById('saveOppBtn').textContent=o?'✓ Guardar cambios':'✓ Guardar';
  populateClientSelect(document.getElementById('ocl'));
  document.getElementById('onm').value=o?o.nm:'';
  document.getElementById('ocl').value=o?o.cl:(clients[0]?clients[0].n+' '+clients[0].a:'');
  document.getElementById('oet').value=o?o.et:'Lead';
  document.getElementById('ov').value=o?o.v:'';
  document.getElementById('opr').value=o?o.pr:'';
  document.getElementById('omodal').classList.add('open');
}
function closeOModal(){document.getElementById('omodal').classList.remove('open');editOppId=null}
function saveOpportunity(){
  const nm=document.getElementById('onm').value.trim();
  if(!nm){toast('Ingresá un nombre para la oportunidad');return}
  const data={nm,cl:document.getElementById('ocl').value,et:document.getElementById('oet').value,v:document.getElementById('ov').value||'$0',pr:document.getElementById('opr').value||'0%'};
  if(editOppId){
    const o=opps.find(x=>x.id===editOppId);
    Object.assign(o,data);
    toast('✓ Oportunidad actualizada');
  } else {
    opps.unshift({id:nextOppId++,...data});
    toast('✓ Oportunidad guardada');
  }
  closeOModal();
  renderView();
}
function deleteOpportunity(id){
  opps=opps.filter(o=>o.id!==id);
  toast('🗑 Oportunidad eliminada');
  renderView();
}

function confirmDelete(type,id,label){
  pendingConfirm={type,id};
  const titles={client:'¿Eliminar cliente?',act:'¿Eliminar actividad?',opp:'¿Eliminar oportunidad?'};
  document.getElementById('cmodalTitle').textContent=titles[type];
  document.getElementById('cmodalMsg').textContent=`Se eliminará "${label}" permanentemente. Esta acción no se puede deshacer.`;
  document.getElementById('cmodal').classList.add('open');
}
function closeCModal(){document.getElementById('cmodal').classList.remove('open');pendingConfirm=null}
function doConfirm(){
  if(!pendingConfirm)return;
  if(pendingConfirm.type==='client')deleteClient(pendingConfirm.id);
  else if(pendingConfirm.type==='act')deleteActivity(pendingConfirm.id);
  else if(pendingConfirm.type==='opp')deleteOpportunity(pendingConfirm.id);
  closeCModal();
}
function toast(msg){const t=document.getElementById('toastEl');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal()});
document.getElementById('amodal').addEventListener('click',e=>{if(e.target===document.getElementById('amodal'))closeAModal()});
document.getElementById('omodal').addEventListener('click',e=>{if(e.target===document.getElementById('omodal'))closeOModal()});
document.getElementById('cmodal').addEventListener('click',e=>{if(e.target===document.getElementById('cmodal'))closeCModal()});
updateAddBtn();
renderView();
</script>
</body>
</html>
